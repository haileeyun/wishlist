<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hailee's Wishlist</title>

  <!-- Google Fonts: Playfair Display for Serifs, Outfit for clean modern UI -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>
<body>
  <div class="container">
    <header class="magazine-header">
      <div class="header-top">
        <span class="meta-item">EDITION 1.0</span>
        <span class="meta-item logo-sub">HAILEE'S PRIVATE ARCHIVE</span>
        <span class="meta-item">ISSUE NO. 01</span>
      </div>
      
      <div class="masthead">
        <h1 class="magazine-title">DELUSION</h1>
        <div class="subtitle-wrap">
          <span class="title-decor-line"></span>
          <p class="magazine-subtitle">Curated Wishlist & Catalog</p>
          <span class="title-decor-line"></span>
        </div>
      </div>
      
      <div class="header-bottom">
        <span class="meta-item">PERSONAL WISHLIST</span>
        <span class="meta-item">VOL. 27</span>
        <span class="meta-item">PAGE 01 — 99</span>
      </div>
    </header>

    <nav class="catalog-nav">
      <div class="nav-label">INDEX / SECTIONS:</div>
      <div class="tabs-container">
        <button class="tab-btn active" data-category="all">00. View All</button>
        <button class="tab-btn" data-category="bags">01. Bags</button>
        <button class="tab-btn" data-category="beauty">02. Beauty</button>
        <button class="tab-btn" data-category="clothing">03. Clothing</button>
        <button class="tab-btn" data-category="shoes">04. Shoes</button>
        <button class="tab-btn" data-category="accessories">05. Accessories</button>
        <button class="tab-btn" data-category="home">06. Home</button>
      </div>
    </nav>

    <main class="wishlist-grid" id="wishlist-grid">
      <!-- Items dynamically populated via script.js -->
    </main>

    <footer class="magazine-footer">
      <span class="footer-line"></span>
      <div class="footer-content">
        <span>© 2026 HAILEE. ALL RIGHTS RESERVED.</span>
        <span>INDEX / CODES / SPECIFICATIONS</span>
        <span>BACK TO TOP ↑</span>
      </div>
    </footer>
  </div>
</body>
</html>
