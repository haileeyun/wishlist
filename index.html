<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hailee's Wishlist</title>

  <!-- Google Fonts: Playfair Display for Serifs, Outfit for clean modern UI -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>Hailee's Wishlist</h1>
      <p>Curated Collection</p>
    </header>

    <div class="tabs-container">
      <button class="tab-btn active" data-category="all">All</button>
      <button class="tab-btn" data-category="bags">Bags</button>
      <button class="tab-btn" data-category="beauty">Beauty</button>
      <button class="tab-btn" data-category="clothing">Clothing</button>
      <button class="tab-btn" data-category="shoes">Shoes</button>
      <button class="tab-btn" data-category="accessories">Accessories</button>
      <button class="tab-btn" data-category="home">Home</button>
    </div>

    <div class="wishlist-grid" id="wishlist-grid">
      <!-- Items dynamically populated via script.js -->
    </div>
  </div>
</body>
</html>
